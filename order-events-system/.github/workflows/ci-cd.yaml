name: CI/CD - order-events-system

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [producer, consumer_inventory, consumer_notification]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "maven"

      - name: Build and run tests
        working-directory: ${{ matrix.service }}
        run: mvn -B verify

      - name: Log in to registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # GitOps pattern: this job doesn't kubectl apply directly. It updates the
      # image tag in a manifests/Helm-values repo that ArgoCD watches, so the
      # cluster state stays declarative and auditable via git history.
      - name: Update image tag for GitOps
        run: |
          echo "Bump image tag to ${{ github.sha }} in your GitOps repo here"
          echo "(e.g. yq eval a Helm values.yaml, commit, push — ArgoCD auto-syncs)"
