spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/inventorydb}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      # Fine for the lab; production would use Flyway/Liquibase migrations.
      ddl-auto: update
    # Let Hibernate create the schema before data.sql seeds it.
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.technicalgrowth.inventoryservice"
        spring.json.value.default.type: com.technicalgrowth.inventoryservice.OrderCreatedEvent
        spring.json.use.type.headers: false
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
