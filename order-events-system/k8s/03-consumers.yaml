apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: order-events
spec:
  # DO NOT scale past 1 until the Week 2 Postgres outbox lands: the stock
  # table and event_id dedup set live in instance memory, so a second replica
  # forks inventory state and breaks idempotency across rebalances.
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: inventory-service:local
          env:
            - name: KAFKA_BOOTSTRAP
              value: "redpanda:29092"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: order-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: notification-service:local
          env:
            - name: KAFKA_BOOTSTRAP
              value: "redpanda:29092"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
