apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: order-events
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: inventory-service:local
          env:
            - name: KAFKA_BOOTSTRAP
              value: "redpanda:29092"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
